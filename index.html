<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>快捷日历提醒 · 愉悦版</title>

  <!-- Google Fonts (optional, improves visual) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#f5f7fb;
      --card:#ffffff;
      --primary:#2563eb;
      --accent:#10b981;
      --danger:#ea4335;
      --muted:#6b7280;
      --radius:14px;
      --glass: rgba(255,255,255,0.6);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      background:linear-gradient(180deg, #eef2ff 0%, var(--bg) 100%);
      color:#0f172a;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      padding:20px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .wrap{
      width:100%;
      max-width:880px;
      margin:0 auto;
      padding:18px;
    }

    header.appbar{
      display:flex;
      gap:12px;
      align-items:center;
      margin-bottom:14px;
    }
    .logo{
      width:54px;height:54px;border-radius:12px;
      background:linear-gradient(135deg,var(--primary),#7c3aed);
      display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:18px;
      box-shadow:0 6px 18px rgba(37,99,235,0.14);
      flex:0 0 54px;
    }
    h1{font-size:18px;margin:0 0 0.1rem 0}
    p.lead{margin:0;color:var(--muted);font-size:13px}

    .card{
      background:var(--card);
      border-radius:var(--radius);
      padding:18px;
      box-shadow: 0 10px 30px rgba(15,23,42,0.06);
      overflow:hidden;
    }

    form.grid{
      display:grid;
      grid-template-columns: 1fr;
      gap:12px;
    }

    @media(min-width:720px){
      form.grid{
        grid-template-columns: 1fr 320px;
        align-items:start;
      }
    }

    .left, .right { padding:6px; }

    label{display:block;font-weight:600;margin-bottom:6px;font-size:13px}
    .field{display:block;width:100%}
    input[type="text"], input[type="datetime-local"], input[type="number"], textarea, select{
      width:100%;
      padding:12px 12px;
      border-radius:10px;
      border:1px solid #e6e9f2;
      background: linear-gradient(180deg,#fff,#fbfdff);
      font-size:14px;
      outline:none;
      color:var(--primary);
    }
    textarea{min-height:84px; resize:vertical}

    .two{display:flex;gap:10px}
    .two > *{flex:1}

    .controls{
      margin-top:6px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    button.btn{
      appearance:none;border:0;
      padding:12px 14px;border-radius:12px;
      color:white;background:var(--primary);
      font-weight:700;font-size:15px;
      cursor:pointer;display:inline-flex;gap:8px;align-items:center;
      box-shadow: 0 8px 20px rgba(37,99,235,0.12);
    }
    button.btn.secondary{
      background:transparent;color:var(--primary);border:1px solid rgba(37,99,235,0.12);
      box-shadow:none;font-weight:600;
    }
    a.link-btn{
      display:inline-flex;align-items:center;gap:8px;padding:10px 12px;border-radius:10px;
      text-decoration:none;color:white;background:var(--danger);font-weight:700;font-size:14px;
    }

    .small{font-size:13px;color:var(--muted)}
    .result{
      margin-top:14px;padding:12px;border-radius:10px;background:linear-gradient(180deg,#f8fbff,#fff);
      border:1px solid #eef2ff;
    }

    .result .row{display:flex;gap:8px;flex-wrap:wrap}
    .chip{
      display:inline-flex;align-items:center;gap:8px;padding:8px 10px;border-radius:10px;background:var(--glass);
      border:1px solid #eef3ff;color:var(--muted);font-weight:600;font-size:14px;
    }

    .notice{
      margin-top:12px;padding:10px;border-radius:10px;background:#fffbe6;border:1px solid #fff1b8;color:#7a5b00;
      font-size:13px;
    }

    /* toast */
    .toast{
      position:fixed;left:50%;transform:translateX(-50%);bottom:22px;padding:12px 16px;background:#111;color:#fff;border-radius:12px;
      box-shadow:0 12px 34px rgba(2,6,23,0.4);display:none;font-weight:600;
      z-index:9999;
    }

    footer.attribution{margin-top:12px;font-size:13px;color:var(--muted)}
    .muted{color:var(--muted)}

    /* larger tap targets on mobile */
    input, textarea, button, a, select { touch-action:manipulation; }
    button.btn{min-height:48px}
  </style>
</head>
<body>
  <div class="wrap">
    <header class="appbar">
      <div class="logo" aria-hidden="true">R</div>
      <div>
        <h1>快捷日历提醒 · 触控友好版</h1>
        <p class="lead">填写事件，生成可下载的 .ics 文件并提供 Google 日历 打开链接。支持移动端分享（若设备支持）。</p>
      </div>
    </header>

    <main class="card" role="main" aria-labelledby="">
      <form id="reminderForm" class="grid" onsubmit="return false;" aria-label="提醒表单">
        <div class="left">
          <label for="title">标题</label>
          <input id="title" class="field" type="text" placeholder="例如：带宝宝看医生" inputmode="text" autocomplete="off" />

          <div style="height:8px"></div>

          <div class="two">
            <div>
              <label for="start">开始时间</label>
              <input id="start" class="field" type="datetime-local" />
            </div>
            <div>
              <label for="end">结束时间（可选）</label>
              <input id="end" class="field" type="datetime-local" />
            </div>
          </div>

          <div style="height:6px"></div>

          <label for="minutes">提醒提前（分钟）</label>
          <input id="minutes" class="field" type="number" min="0" value="30" />

          <div style="height:8px"></div>

          <label for="desc">描述（可选）</label>
          <textarea id="desc" class="field" placeholder="更多说明，比如门诊号/注意事项"></textarea>

          <div style="height:8px"></div>

          <label for="loc">地点（可选）</label>
          <input id="loc" class="field" type="text" placeholder="医院/教室/线上会议链接等" />
        </div>

        <aside class="right" aria-hidden="false">
          <div style="display:flex;flex-direction:column;gap:12px;">
            <div>
              <label for="autoDownload" style="display:flex;align-items:center;gap:8px">
                <input id="autoDownload" type="checkbox" checked /> 自动下载 .ics
              </label>
              <div class="small muted" style="margin-top:8px">
                如果浏览器阻止自动下载，你可以手动点击下面的“下载 .ics”按钮。
              </div>
            </div>

            <div>
              <label class="small">快速操作</label>
              <div class="controls">
                <button id="generate" class="btn" type="button" aria-label="生成并下载提醒">
                  <!-- svg plus -->
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                  生成提醒
                </button>

                <button id="downloadBtn" class="btn secondary" type="button" aria-label="手动下载 .ics（生成后可用）">
                  下载 .ics
                </button>

                <button id="shareBtn" class="btn secondary" type="button" aria-label="分享事件" style="display:none">
                  分享（设备支持时显示）
                </button>
              </div>
            </div>

            <div class="result" id="result" style="display:none">
              <div class="row" id="linksArea"></div>
              <div style="height:10px"></div>
              <div class="small muted" id="summaryText"></div>
            </div>

            <div class="notice">
              提示：.ics 文件可导入 Apple 日历、Outlook、部分安卓日历应用。Google 日历会打开预填事件页面，请在 Google 页面上保存以完成添加。
            </div>

            <div style="display:flex;gap:8px;align-items:center;justify-content:flex-start">
              <button id="addRRULE" class="btn secondary" type="button" aria-label="添加重复示例">添加每日重复（示例）</button>
              <button id="clearBtn" class="btn secondary" type="button" aria-label="清空表单">清空表单</button>
            </div>

            <div class="muted" style="font-size:13px;margin-top:6px">小技巧：如果你想把页面放到手机主屏幕，保存为书签或使用静态托管（GitHub Pages）即可随时打开。</div>
          </div>
        </aside>
      </form>

      <div class="toast" id="toast" role="status" aria-live="polite">已生成并下载</div>

      <footer class="attribution">由快捷提醒生成器 · 触控版 编写 • 直接保存为 <code>index.html</code> 后打开即可</footer>
    </main>
  </div>

<script>
/* Helper utils */
function pad(n){return n<10?'0'+n:n}
function dtLocalToICS(dt){ // local Date -> YYYYMMDDTHHMMSS (no Z)
  return dt.getFullYear().toString()
    + pad(dt.getMonth()+1)
    + pad(dt.getDate())
    + 'T' + pad(dt.getHours()) + pad(dt.getMinutes()) + pad(dt.getSeconds());
}
function toUTCStringForGoogle(dt){ return dt.toISOString().replace(/[-:]/g,'').split('.')[0] + 'Z'; }
function escapeICSText(s){ return (s||'').toString().replace(/\\/g,'\\\\').replace(/;/g,'\\;').replace(/,/g,'\\,').replace(/\r?\n/g,'\\n'); }
function showToast(msg, ms=2200){
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display='block'; t.style.opacity='1';
  clearTimeout(t._to);
  t._to = setTimeout(()=>{ t.style.opacity='0'; t.style.display='none'; }, ms);
}

/* Elements */
const form = document.getElementById('reminderForm');
const titleEl = document.getElementById('title');
const startEl = document.getElementById('start');
const endEl = document.getElementById('end');
const minutesEl = document.getElementById('minutes');
const descEl = document.getElementById('desc');
const locEl = document.getElementById('loc');
const autoDownloadEl = document.getElementById('autoDownload');
const generateBtn = document.getElementById('generate');
const downloadBtn = document.getElementById('downloadBtn');
const shareBtn = document.getElementById('shareBtn');
const linksArea = document.getElementById('linksArea');
const resultDiv = document.getElementById('result');
const summaryText = document.getElementById('summaryText');
const addRRULE = document.getElementById('addRRULE');
const clearBtn = document.getElementById('clearBtn');

let lastBlobUrl = null;
let lastBlobFile = null;
let lastGoogleUrl = null;
let currentRRULE = ''; // for future extension

/* Defaults: set start to next hour rounded */
(function setDefaultStart(){
  const now = new Date();
  now.setMinutes(0,0,0);
  now.setHours(now.getHours()+1);
  const s = now.toISOString().slice(0,16);
  startEl.value = s;
  const end = new Date(now.getTime() + 60*60*1000);
  endEl.value = end.toISOString().slice(0,16);
})();

function buildICS({title, startDate, endDate, minutes, desc, loc, rrule}){
  const uid = 'reminder-' + Date.now() + '-' + Math.floor(Math.random()*10000) + '@scastudio2025';
  const dtstamp = new Date().toISOString().replace(/[-:]/g,'').split('.')[0] + 'Z';
  const dtstart = dtLocalToICS(startDate);
  const dtend = dtLocalToICS(endDate);
  const alarmMinutes = Math.max(0, minutes);
  let lines = [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//scastudio2025//QuickReminder//ZH',
    'BEGIN:VEVENT',
    `UID:${uid}`,
    `DTSTAMP:${dtstamp}`,
    `DTSTART:${dtstart}`,
    `DTEND:${dtend}`,
    `SUMMARY:${escapeICSText(title)}`,
    `DESCRIPTION:${escapeICSText(desc)}`,
    `LOCATION:${escapeICSText(loc)}`
  ];
  if(rrule){
    lines.push(`RRULE:${rrule}`);
  }
  lines = lines.concat([
    'BEGIN:VALARM',
    `TRIGGER:-PT${alarmMinutes}M`,
    'ACTION:DISPLAY',
    `DESCRIPTION:提醒：${escapeICSText(title)}`,
    'END:VALARM',
    'END:VEVENT',
    'END:VCALENDAR'
  ]);
  return lines.join('\r\n');
}

function createBlobAndLinks(icsContent, filename, title){
  // revoke previous
  if(lastBlobUrl){ URL.revokeObjectURL(lastBlobUrl); lastBlobUrl = null; lastBlobFile = null; }

  const blob = new Blob([icsContent], {type:'text/calendar;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  lastBlobUrl = url;
  lastBlobFile = new File([blob], filename, {type: blob.type});

  // prepare download link element
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.className = 'chip';
  a.textContent = '下载 .ics 文件';
  a.setAttribute('title','点击下载 .ics（若自动下载被禁用，可在此手动下载）');

  // prepare google link
  // Use UTC strings for google
  const startUTC = toUTCStringForGoogle(currentData.startDate);
  const endUTC = toUTCStringForGoogle(currentData.endDate);
  const gTitle = encodeURIComponent(currentData.title);
  const gDesc = encodeURIComponent(currentData.desc);
  const gLoc = encodeURIComponent(currentData.loc);
  let gUrl = `https://www.google.com/calendar/render?action=TEMPLATE&text=${gTitle}&details=${gDesc}&location=${gLoc}&dates=${startUTC}/${endUTC}`;
  if(currentData.rrule){
    // Google uses recurrence param: &recur=RRULE:<encoded>
    gUrl += '&recur=' + encodeURIComponent('RRULE:' + currentData.rrule);
  }
  lastGoogleUrl = gUrl;
  const aG = document.createElement('a');
  aG.href = gUrl; aG.target='_blank'; aG.rel='noopener'; aG.className='chip';
  aG.textContent = '在 Google 日历 打开';

  // copy button
  const copyBtn = document.createElement('button');
  copyBtn.type='button';
  copyBtn.className='chip';
  copyBtn.textContent='复制 Google 链接';
  copyBtn.addEventListener('click', async ()=>{
    try{
      await navigator.clipboard.writeText(lastGoogleUrl);
      showToast('已复制 Google 日历 链接');
    }catch(e){ alert('复制失败，请手动复制链接'); }
  });

  // share button visibility
  if(navigator.canShare && navigator.canShare({files:[lastBlobFile]})){
    shareBtn.style.display = 'inline-flex';
  } else if (navigator.share){
    shareBtn.style.display = 'inline-flex';
  } else {
    shareBtn.style.display = 'none';
  }

  // clear area and append
  linksArea.innerHTML = '';
  linksArea.appendChild(a);
  linksArea.appendChild(aG);
  linksArea.appendChild(copyBtn);

  // set downloadBtn action
  downloadBtn.onclick = ()=>{ a.click(); };

  // open automatically if chosen
  if(autoDownloadEl.checked){
    // attempt direct download
    setTimeout(()=>{ a.click(); }, 120);
  }

  // set summary text
  summaryText.textContent = `事件：${title} · ${startEl.value} → ${endEl.value}  · 提醒提前 ${minutesEl.value} 分钟`;
  resultDiv.style.display = 'block';
}

/* Current data container */
let currentData = {};

generateBtn.addEventListener('click', function(){
  const title = titleEl.value.trim() || '提醒';
  const startVal = startEl.value;
  if(!startVal){ alert('请填写开始时间'); startEl.focus(); return; }
  const startDate = new Date(startVal);
  const endDate = endEl.value ? new Date(endEl.value) : new Date(startDate.getTime() + 60*60*1000);
  if(endDate <= startDate){
    if(!confirm('结束时间早于或等于开始时间，是否将结束时间设为开始时间后1小时？')) return;
    endDate.setTime(startDate.getTime() + 60*60*1000);
  }
  const minutes = parseInt(minutesEl.value) || 0;
  const desc = descEl.value.trim();
  const loc = locEl.value.trim();
  const rrule = currentRRULE || '';

  currentData = {title, startDate, endDate, minutes, desc, loc, rrule};

  const ics = buildICS({title, startDate, endDate, minutes, desc, loc, rrule});
  // safe filename
  const filename = 'reminder-' + title.replace(/[^\w\u4e00-\u9fa5\-]/g,'_') + '.ics';

  createBlobAndLinks(ics, filename, title);

  showToast('已生成提醒');
});

shareBtn.addEventListener('click', async ()=>{
  if(!lastBlobFile && !lastGoogleUrl){ alert('请先生成事件'); return; }
  // prefer sharing file if supported
  try{
    if(navigator.canShare && navigator.canShare({files:[lastBlobFile]})){
      await navigator.share({files:[lastBlobFile], title: currentData.title, text: currentData.desc || currentData.title});
    } else if(navigator.share){
      await navigator.share({title: currentData.title, text: `${currentData.title}\n${lastGoogleUrl}` , url: lastGoogleUrl});
    } else {
      alert('当前设备/浏览器不支持分享。你可以手动下载 .ics 或复制链接。');
    }
  }catch(e){
    console.error(e);
    alert('分享被取消或失败');
  }
});

/* RRULE quick example: add daily repetition for 3 occurrences */
addRRULE.addEventListener('click', ()=>{
  // Example: daily repeat 7 times
  currentRRULE = 'FREQ=DAILY;COUNT=7';
  showToast('已添加：每日重复（7次），生成时会写入 RRULE');
});

/* clear */
clearBtn.addEventListener('click', ()=>{
  if(!confirm('清空表单？')) return;
  titleEl.value = '';
  descEl.value = '';
  locEl.value = '';
  minutesEl.value = '30';
  currentRRULE = '';
  setDefaultStart();
  linksArea.innerHTML = '';
  resultDiv.style.display = 'none';
  showToast('已清空');
});

/* small helper: keep default start function available for reset */
function setDefaultStart(){
  const now = new Date();
  now.setMinutes(0,0,0);
  now.setHours(now.getHours()+1);
  const s = now.toISOString().slice(0,16);
  startEl.value = s;
  const end = new Date(now.getTime() + 60*60*1000);
  endEl.value = end.toISOString().slice(0,16);
}

/* Accessibility / keyboard: Enter on title triggers generate */
titleEl.addEventListener('keydown', (e)=>{ if(e.key==='Enter'){ generateBtn.click(); e.preventDefault(); } });

</script>
</body>
</html>
